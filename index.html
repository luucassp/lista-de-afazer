<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="style.css">
</head><!-- CORREÇÃO: </head> estava faltando -->
<body>

  <!-- CORREÇÃO: .container envolve tudo -->
  <!-- CORREÇÃO: .box adicionado — era referenciado no CSS mas não existia no HTML -->
  <section class="container">
    <div class="box">

      <button class="btn-tema" title="Alternar tema claro/escuro" aria-label="alternar entre claro escuro">🌙</button>

      <h1>Lista de Tarefas</h1>

      <!-- CORREÇÃO: input e button saem do <p> — semânticamente incorreto -->
      <!-- MELHORIA: label real para acessibilidade -->
      <div class="campo">
        <label for="input-tarefa">Nova tarefa</label>
        <input 
              type="text" 
              id="input-tarefa"
              class="input-tarefa"
              placeholder="Ex: Estudar CSS..."
              autocomplete="off"
        >
        <button class="btn-tarefa">Adicionar</button>
      </div>

      <!-- MELHORIA: mensagem exibida quando lista está vazia -->
      <p class="lista-vazia">Nenhuma tarefa ainda. Adicione uma acima!</p>

      <ul class="tarefa"></ul>

    </div><!-- fim .box -->
  </section>

  <script src="script.js"></script><!-- CORREÇÃO: era 'scrip.js' -->
</body>
</html>
